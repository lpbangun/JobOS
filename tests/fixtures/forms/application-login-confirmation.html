<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Configured application with login-shaped confirmation</title></head>
<body>
  <h1>Apply to Example Co</h1>
  <form aria-label="Job application form" action="/submit/application?outcome=login-confirmed" method="post">
    <label for="login-confirmed-name">Full name</label>
    <input id="login-confirmed-name" name="full_name" type="text" required>
    <button type="submit">Submit application</button>
  </form>
</body>
</html>

<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Unrelated-origin redirect</title></head>
<body>
  <h1>Apply to Example Co</h1>
  <form aria-label="Job application form" action="/submit/application?outcome=unrelated" method="post">
    <label for="candidate-name">Full name</label>
    <input id="candidate-name" name="full_name" type="text" required>
    <button type="submit">Submit application</button>
  </form>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JobOS · Funky</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0c0a12;--panel:#151122;--border:#3a2f55;--text:#f3e8ff;--muted:#a78bfa;
      --accent:#f472b6;--cyan:#22d3ee;--ok:#4ade80;--warn:#fbbf24;--focus:#22183a;
    }
    body{
      font-family:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
      background:
        radial-gradient(1000px 500px at 10% -10%, #3b0764 0%, transparent 50%),
        radial-gradient(800px 400px at 100% 0%, #83184355 0%, transparent 45%),
        #07050c;
      color:var(--text);min-height:100vh;padding:12px;font-size:12.5px;line-height:1.4;
    }
    .note{max-width:1200px;margin:0 auto 10px;font-family:system-ui,sans-serif;color:#c4b5fd;font-size:12px}
    .app{
      max-width:1200px;margin:0 auto;border:1px solid var(--border);background:linear-gradient(180deg,#120f1c 0%,var(--bg) 40%);
      min-height:780px;display:grid;grid-template-rows:auto 1fr auto;position:relative;border-radius:16px;overflow:hidden;
      box-shadow:0 0 0 1px #2e1065, 0 25px 80px rgba(88,28,135,.35);
      animation:enter .35s ease-out;
    }
    @keyframes enter{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--muted);gap:10px;background:#120f1ccc;backdrop-filter:blur(6px)}
    header b{
      font-weight:700;letter-spacing:.04em;
      background:linear-gradient(90deg,var(--cyan),var(--accent),#c084fc);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    .pill{border:1px solid var(--border);padding:2px 8px;border-radius:999px;color:var(--muted);cursor:pointer;transition:transform .12s ease,border-color .12s ease,color .12s ease}
    .pill:hover{transform:translateY(-1px);color:var(--text);border-color:#7c3aed}
    .pill.on{color:var(--accent);border-color:#db2777;box-shadow:0 0 0 1px #db277733}
    .workspace{display:grid;grid-template-columns:340px 1fr;min-height:0}
    .workspace.agent-on{grid-template-columns:300px 1fr 320px}
    .pane{border-right:1px solid var(--border);min-height:620px;overflow:auto}
    .pane:last-child{border-right:none}
    .list,.detail,.agent{padding:10px}
    .agent{display:none;background:#100d1a}
    .workspace.agent-on .agent{display:block;animation:slidein .2s ease-out}
    @keyframes slidein{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
    .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .filter{border:1px solid var(--border);color:var(--muted);padding:4px 8px;border-radius:999px;cursor:pointer;background:transparent;font:inherit;transition:transform .12s ease, background .12s ease}
    .filter:hover{transform:translateY(-1px)}
    .filter.on{color:#fff;border-color:transparent;background:linear-gradient(90deg,#7c3aed,#db2777)}
    .job{padding:9px 8px;border:1px solid transparent;border-radius:10px;cursor:pointer;margin-bottom:3px;transition:transform .12s ease, background .12s ease, border-color .12s ease}
    .job:hover{background:var(--focus);transform:translateX(2px)}
    .job.on{background:var(--focus);border-color:#7c3aed;box-shadow:inset 2px 0 0 var(--cyan)}
    .job .t{display:flex;justify-content:space-between;gap:8px}
    .job .m{color:var(--muted);margin-top:3px;font-size:11.5px}
    .muted{color:var(--muted)}
    h2{font-size:13px;font-weight:700;margin-bottom:8px}
    .block{border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:10px;background:var(--panel);transition:border-color .15s ease}
    .block:hover{border-color:#6d28d9}
    .actions{display:flex;flex-wrap:wrap;gap:6px}
    .btn{border:1px solid var(--border);background:#1a1430;color:var(--text);border-radius:8px;padding:6px 9px;font:inherit;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(219,39,119,.15);border-color:#a855f7}
    .btn.primary{border:none;background:linear-gradient(90deg,var(--cyan),var(--accent));color:#1a0533;font-weight:700}
    .btn.ghost{background:transparent;color:var(--muted)}
    footer{border-top:1px solid var(--border);padding:8px 12px;display:flex;justify-content:space-between;gap:8px;color:var(--muted);flex-wrap:wrap;background:#120f1c}
    kbd{border:1px solid #6d28d9;padding:0 5px;border-radius:4px;color:var(--cyan);margin-right:2px}
    .cmd{display:none;border-top:1px solid var(--border);padding:8px 12px;gap:8px;align-items:center;background:#0d0a14}
    .cmd.open{display:flex;animation:enter .2s ease-out}
    .cmd input{flex:1;background:transparent;border:1px solid var(--border);color:var(--text);font:inherit;padding:7px 8px;border-radius:8px;outline:none}
    .cmd input:focus{border-color:var(--accent);box-shadow:0 0 0 2px #db277733}
    .overlay{position:absolute;inset:0;background:rgba(8,5,15,.8);display:none;align-items:center;justify-content:center;padding:20px;z-index:5;backdrop-filter:blur(3px)}
    .overlay.open{display:flex}
    .modal{width:min(720px,100%);max-height:80vh;overflow:auto;background:linear-gradient(180deg,#1a1430,#120f1c);border:1px solid #7c3aed;border-radius:14px;padding:14px;animation:pop .18s ease-out;box-shadow:0 20px 60px rgba(124,58,237,.25)}
    @keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
    .modal h3{margin-bottom:8px;background:linear-gradient(90deg,var(--cyan),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
    .msg{border:1px solid var(--border);border-radius:12px;padding:8px;margin-bottom:8px;background:var(--panel)}
    .msg .who{color:var(--accent);font-size:11px;margin-bottom:4px}
    textarea{width:100%;min-height:52px;background:#0d0a14;border:1px solid var(--border);color:var(--text);font:inherit;padding:8px;border-radius:8px;outline:none;resize:vertical}
    .loader{display:none;align-items:center;gap:8px;color:var(--muted)}
    .bar{width:84px;height:4px;background:#2e1065;overflow:hidden;border-radius:99px}
    .bar>i{display:block;height:100%;width:40%;background:linear-gradient(90deg,var(--cyan),var(--accent),#c084fc);animation:slide 0.9s linear infinite;border-radius:99px}
    @keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(280%)}}
    .pulse{color:var(--cyan);animation:pulse 1.2s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.5}}
    .doc-line{padding:6px 0;border-bottom:1px solid #2e1065;cursor:pointer;transition:color .12s ease, padding-left .12s ease}
    .doc-line:hover,.doc-line.on{color:var(--cyan);padding-left:4px}
    .toast{position:fixed;right:16px;bottom:16px;background:#3b0764;border:1px solid #c026d3;color:#f5d0fe;padding:8px 10px;border-radius:10px;display:none;z-index:9;animation:pop .15s ease-out}
    .row{display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid #2e1065}
    @media (prefers-reduced-motion:reduce){
      .app,.job,.btn,.pill,.filter,.agent,.cmd,.modal,.toast{animation:none!important;transition:none!important}
    }
  </style>
</head>
<body>
  <div class="note"><b>Style 3 · Funky / Amp-ish</b> — gradients, soft motion (CSS only, respects reduced-motion). Same structure as 006/007.</div>
  <div class="app">
    <header>
      <div><b>jobos</b> <span class="pill" id="profile">pm-edtech ▾</span></div>
      <div class="loader" id="loader"><span class="pulse">working</span><span class="bar"><i></i></span></div>
      <div>
        <span class="pill" id="btn-review">review 4</span>
        <span class="pill" id="btn-agent">agent</span>
        <span class="pill" id="btn-sys">system</span>
        <span class="muted"> effects off</span>
      </div>
    </header>
    <div class="workspace" id="ws">
      <section class="pane list">
        <div class="filters">
          <button class="filter on" data-f="today">Today</button>
          <button class="filter" data-f="all">All</button>
          <button class="filter" data-f="review">Review</button>
          <button class="filter" data-f="materials">Materials</button>
          <button class="filter" data-f="applied">Applied</button>
          <button class="filter" data-f="interview">Interview</button>
        </div>
        <div id="jobs"></div>
      </section>
      <section class="pane detail">
        <div class="block">
          <div class="muted" style="margin-bottom:4px">Selected</div>
          <h2 id="d-title">—</h2>
          <div class="muted" id="d-sub"></div>
        </div>
        <div class="block">
          <div class="muted" style="margin-bottom:6px">Next</div>
          <div id="d-next"></div>
        </div>
        <div class="actions" id="d-actions"></div>
        <div id="review-panel" class="block" style="display:none;margin-top:12px">
          <div class="muted" style="margin-bottom:8px">Review queue</div>
          <div id="review-list"></div>
        </div>
      </section>
      <section class="pane agent" id="agent">
        <h2>Agent</h2>
        <div id="msgs"></div>
        <textarea id="input" placeholder="Steer selected job…"></textarea>
        <div class="actions" style="margin-top:8px">
          <button class="btn primary" id="send">Send</button>
          <button class="btn ghost" id="hide-agent">Hide</button>
        </div>
      </section>
    </div>
    <div class="cmd" id="cmdbar"><span style="color:var(--cyan)">:</span><input id="cmd" placeholder="pursue · daily · …" /><button class="btn" id="runcmd">run</button></div>
    <footer>
      <div><kbd>j/k</kbd>list <kbd>a</kbd>agent <kbd>r</kbd>review <kbd>:</kbd>cmd <kbd>n</kbd>network <kbd>o</kbd>docs <kbd>s</kbd>sources <kbd>?</kbd>system <kbd>p</kbd>/<kbd>d</kbd></div>
      <div id="status">ready</div>
    </footer>
    <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="/_picked-shell.js"></script>
</body>
</html>
